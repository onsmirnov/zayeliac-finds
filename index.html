<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zayeliac Finds | Gluten-Free Products UK</title>
    <meta name="description" content="Discover gluten-free food products available in the UK - from everyday essentials to hard-to-find niche items.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        sage: {
                            50: '#f6f7f6',
                            100: '#e3e7e3',
                            200: '#c7d0c7',
                            300: '#a3b1a3',
                            400: '#7d8f7d',
                            500: '#627362',
                            600: '#4d5b4d',
                            700: '#404a40',
                            800: '#363d36',
                            900: '#2f342f',
                        },
                        wheat: {
                            50: '#fdfcf9',
                            100: '#f9f5eb',
                            200: '#f2e9d5',
                            300: '#e8d7b7',
                            400: '#dcc296',
                            500: '#cda96f',
                            600: '#b88f54',
                            700: '#9a7346',
                            800: '#7d5d3d',
                            900: '#664d35',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }
        .product-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.1);
        }
        .filter-btn.active {
            background-color: #627362;
            color: white;
        }
        .niche-badge {
            background: linear-gradient(135deg, #627362 0%, #4d5b4d 100%);
        }
    </style>
</head>
<body class="bg-wheat-50 text-gray-800 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 sm:px-6 lg:px-8">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                <div>
                    <h1 class="text-2xl sm:text-3xl font-bold text-sage-700">🌾 Zayeliac Finds</h1>
                    <p class="text-sm text-gray-500 mt-1">Gluten-free products in the UK</p>
                </div>
                <div class="relative w-full sm:w-80">
                    <input 
                        type="text" 
                        id="search" 
                        placeholder="Search products, brands..." 
                        class="w-full px-4 py-2 pl-10 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-sage-400 focus:border-transparent"
                    >
                    <svg class="absolute left-3 top-2.5 h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
            </div>
        </div>
    </header>

    <!-- Filters -->
    <div class="bg-white border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 py-3 sm:px-6 lg:px-8">
            <div class="flex flex-wrap gap-2" id="filters">
                <button class="filter-btn active px-4 py-2 rounded-full text-sm font-medium bg-gray-100 text-gray-700 hover:bg-sage-500 hover:text-white transition-colors" data-category="all">
                    All
                </button>
                <button class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-gray-100 text-gray-700 hover:bg-sage-500 hover:text-white transition-colors" data-category="niche">
                    ✨ Niche Finds
                </button>
                <button class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-gray-100 text-gray-700 hover:bg-sage-500 hover:text-white transition-colors" data-category="Bread">
                    🍞 Bread
                </button>
                <button class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-gray-100 text-gray-700 hover:bg-sage-500 hover:text-white transition-colors" data-category="Bakery">
                    🥐 Bakery
                </button>
                <button class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-gray-100 text-gray-700 hover:bg-sage-500 hover:text-white transition-colors" data-category="Pasta">
                    🍝 Pasta
                </button>
                <button class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-gray-100 text-gray-700 hover:bg-sage-500 hover:text-white transition-colors" data-category="Snacks">
                    🍪 Snacks
                </button>
                <button class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-gray-100 text-gray-700 hover:bg-sage-500 hover:text-white transition-colors" data-category="Sweets">
                    🍬 Sweets
                </button>
                <button class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-gray-100 text-gray-700 hover:bg-sage-500 hover:text-white transition-colors" data-category="Breakfast">
                    🥣 Breakfast
                </button>
                <button class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-gray-100 text-gray-700 hover:bg-sage-500 hover:text-white transition-colors" data-category="Ready Meals">
                    🍽️ Ready Meals
                </button>
                <button class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-gray-100 text-gray-700 hover:bg-sage-500 hover:text-white transition-colors" data-category="Baking">
                    🧁 Baking
                </button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
        <!-- Results count -->
        <div class="mb-6 flex items-center justify-between">
            <p class="text-gray-600"><span id="results-count">0</span> products</p>
            <label class="flex items-center gap-2 text-sm text-gray-600 cursor-pointer">
                <input type="checkbox" id="niche-only" class="rounded border-gray-300 text-sage-600 focus:ring-sage-500">
                Show niche only
            </label>
        </div>

        <!-- Product Grid -->
        <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Products will be inserted here -->
        </div>

        <!-- No results -->
        <div id="no-results" class="hidden text-center py-16">
            <div class="text-6xl mb-4">🔍</div>
            <h3 class="text-xl font-semibold text-gray-700 mb-2">No products found</h3>
            <p class="text-gray-500">Try adjusting your search or filters</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-100 mt-16">
        <div class="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
            <div class="text-center text-gray-500 text-sm">
                <p class="mb-2">🌾 Zayeliac Finds — Curated gluten-free products for the UK</p>
                <p class="text-xs">Always check product labels. Availability and formulations may change. Last updated: <span id="last-updated"></span></p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
